# Reference-only upstream source checkouts live under docs/research/infra/.
# They are pinned snapshots, not our code, so every pre-commit job excludes
# that path to avoid reformatting/scanning verbatim upstream trees.
pre-commit:
  jobs:
    - run: react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if react-doctor --staged --blocking warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run react-doctor --staged --blocking warning to inspect." "Want them fixed? Ask your agent to run that command and resolve the findings." >&2; fi
      exclude: "docs/research/infra/**"
    - run: pnpm dlx ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      exclude:
        - "docs/research/infra/**"
        - ".agents/skills/**"
      stage_fixed: true
    - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- {staged_files}
      glob: "**/*.rs"
      exclude: "docs/research/infra/**"
      stage_fixed: true
